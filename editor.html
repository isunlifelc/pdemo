<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飞猪千问 - 编辑器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #f5f5f5;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        
        /* 内嵌模式样式 */
        body.embedded-mode {
            background-color: #fff;
        }
        
        body.embedded-mode .editor-panel {
            width: calc(100% - 430px);
            border-right: none;
        }
        
        /* 内嵌模式下预览面板改为右侧固定显示 */
        body.embedded-mode .preview-panel {
            position: absolute;
            right: 0;
            top: 61px; /* header height */
            bottom: 0;
            width: 430px;
            background: #E8E8E8;
            border-left: 1px solid #ddd;
            z-index: 100;
            display: flex !important;
            align-items: flex-start;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }
        
        body.embedded-mode .add-module-bar {
            right: 450px;
        }
        
        /* 保存按钮（内嵌模式） */
        .save-btn {
            padding: 8px 16px;
            border: none;
            background: #22c55e;
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            display: none;
            align-items: center;
            gap: 6px;
        }
        
        .save-btn.show {
            display: flex;
        }
        
        .save-btn:hover {
            background: #16a34a;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
        }
        
        .save-btn svg {
            width: 16px;
            height: 16px;
        }
        
        /* 左侧编辑器区域 */
        .editor-panel {
            width: 50%;
            background: #fff;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }
        
        .editor-header {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fafafa;
        }
        
        .editor-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        
        .mode-switch {
            display: flex;
            gap: 8px;
        }
        
        .download-btn {
            padding: 8px 16px;
            border: none;
            background: #6666FF;
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .download-btn:hover {
            background: #5555EE;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 102, 255, 0.3);
        }
        
        .download-btn svg {
            width: 16px;
            height: 16px;
        }
        
        .mode-btn {
            padding: 8px 16px;
            border: 1px solid #ddd;
            background: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .mode-btn.active {
            background: #6666FF;
            color: #fff;
            border-color: #6666FF;
        }
        
        .back-btn {
            padding: 8px 16px;
            border: 1px solid #ddd;
            background: #fff;
            color: #333;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            display: none;
            align-items: center;
            gap: 6px;
        }
        
        .back-btn.show {
            display: flex;
        }
        
        .back-btn:hover {
            background: #f5f5f5;
            border-color: #ccc;
        }
        
        .back-btn svg {
            width: 16px;
            height: 16px;
        }
        
        /* 预览区返回按钮 */
        .preview-back-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 20px;
            z-index: 200;
            display: none;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .preview-back-bar.show {
            display: block;
        }
        
        .preview-back-btn {
            background: #f5f5f5;
            border: 1px solid #ddd;
            color: #333;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            font-weight: 500;
        }
        
        .preview-back-btn:hover {
            background: #e8e8e8;
            border-color: #ccc;
        }
        
        .preview-back-btn svg {
            width: 16px;
            height: 16px;
        }
        
        .editor-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 80px;
        }
        
        .add-module-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: calc(50% + 20px);
            background: #fff;
            border-top: 1px solid #e0e0e0;
            padding: 12px 20px;
            z-index: 50;
            box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.05);
        }
        
        .add-module-bar h3 {
            font-size: 13px;
            font-weight: 600;
            color: #666;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .module-type-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .module-type-btn {
            padding: 6px 12px;
            border: 1px solid #ddd;
            background: #fff;
            color: #333;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            white-space: nowrap;
        }
        
        .module-type-btn:hover {
            background: #6666FF;
            color: #fff;
            border-color: #6666FF;
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(102, 102, 255, 0.2);
        }
        
        .module-item {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 16px;
            overflow: hidden;
            cursor: grab;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), 
                        box-shadow 0.2s cubic-bezier(0.4, 0, 0.2, 1),
                        outline 0.3s ease;
            max-width: 100%;
        }
        
        /* 内嵌模式下调整模块项宽度 */
        body.embedded-mode .module-item {
            max-width: calc(100% - 430px);
        }
        
        .module-item:active {
            cursor: grabbing;
        }
        
        .module-item.dragging {
            opacity: 0.5;
            transform: scale(1.02);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), 
                        opacity 0.15s ease,
                        box-shadow 0.15s ease;
        }
        
        .module-item.drag-over {
            border-color: #6666FF;
            border-style: dashed;
            background: #f8f7ff;
            transition: border-color 0.15s ease, background 0.15s ease;
        }
        
        .module-item.highlight {
            outline: 3px solid #6666FF !important;
            outline-offset: -3px;
            background: rgba(102, 102, 255, 0.05);
            transition: all 0.3s ease;
        }
        
        .module-item.highlight .module-header {
            background: #6666FF;
            border-bottom-color: #5555EE;
        }
        
        .module-item.highlight .module-name {
            color: #fff;
        }
        
        .module-item.highlight .drag-handle svg {
            fill: #fff;
        }
        
        .module-item.editing {
            outline: 3px solid #00C853 !important;
            outline-offset: -3px;
            background: rgba(0, 200, 83, 0.05);
        }
        
        .module-item.editing .module-header {
            background: #00C853;
            border-bottom-color: #00A845;
        }
        
        .module-item.editing .module-name {
            color: #fff;
        }
        
        .module-item.editing .drag-handle svg {
            fill: #fff;
        }
        
        .module-item.drag-over {
            border-color: #6666FF;
            border-style: dashed;
            background: #f8f7ff;
        }
        
        .module-header {
            padding: 12px 16px;
            background: #f9f9f9;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .module-name {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }
        
        .module-actions {
            display: flex;
            gap: 8px;
        }
        
        .action-btn-small {
            padding: 4px 8px;
            font-size: 12px;
            border: 1px solid #ddd;
            background: #fff;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .action-btn-small:hover {
            background: #f0f0f0;
        }
        
        .drag-handle {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #999;
            margin-right: 8px;
        }
        
        .drag-handle svg {
            fill: #999;
            transition: fill 0.2s;
        }
        
        .module-item.highlight .drag-handle svg {
            fill: #fff;
        }
        
        .module-item.editing .drag-handle svg {
            fill: #fff;
        }
        
        .module-body {
            padding: 16px;
        }
        
        .editable-field {
            margin-bottom: 12px;
        }
        
        .field-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
            font-weight: 500;
        }
        
        .field-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
        }
        
        .field-input:focus {
            outline: none;
            border-color: #6666FF;
        }
        
        textarea.field-input {
            min-height: 80px;
            resize: vertical;
        }
        
        .field-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .field-row .editable-field {
            flex: 1;
            margin-bottom: 0;
        }
        
        .visibility-toggle {
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        
        .visibility-toggle:hover {
            background: #f0f0f0;
        }
        
        .visibility-toggle svg {
            width: 18px;
            height: 18px;
            color: #999;
        }
        
        .visibility-toggle.hidden svg {
            color: #ccc;
        }
        
        .field-hidden {
            opacity: 0.5;
        }
        
        .field-hidden .field-input {
            background: #f9f9f9;
        }
        
        /* 右侧预览区域 */
        .preview-panel {
            width: 50%;
            background: #E8E8E8;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
            position: relative;
        }
        
        .phone-container {
            width: 100%;
            max-width: 430px;
            background-color: #F7F8FA;
            height: 100vh;
            max-height: 850px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.1);
            border-radius: 40px;
        }
        
        /* 原始样式保持不变 */
        .bottom-bg-image {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 0;
            pointer-events: none;
        }
        
        .bottom-bg-image img {
            width: 100%;
            display: block;
        }
        
        .header-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #F7F8FA;
            z-index: 100;
        }
        
        .status-bar {
            height: 44px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px 0 24px;
            font-size: 15px;
            font-weight: 600;
        }
        
        .status-icons {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 16px 12px;
        }
        
        .header-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            transition: background-color 0.2s;
        }
        
        .header-icon:hover {
            background-color: rgba(0, 0, 0, 0.05);
        }
        
        .header-icon svg {
            width: 24px;
            height: 24px;
            color: #1a1a1a;
        }
        
        .header-title {
            font-size: 20px;
            font-weight: 600;
            color: #0F131A;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .chat-content {
            flex: 1;
            overflow-y: auto;
            padding: 100px 16px 120px;
            position: relative;
            z-index: 1;
        }
        
        .chat-content::-webkit-scrollbar {
            display: none;
        }
        
        /* 预览区可拖拽模块样式 */
        .preview-module {
            position: relative;
            cursor: grab;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), 
                        opacity 0.2s cubic-bezier(0.4, 0, 0.2, 1),
                        box-shadow 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .preview-module:active {
            cursor: grabbing;
        }
        
        .preview-module:hover {
            outline: 2px dashed #6666FF;
            outline-offset: 4px;
        }
        
        .preview-module.dragging {
            opacity: 0.4;
            transform: scale(1.03);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.15);
            z-index: 100;
            transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), 
                        opacity 0.15s ease,
                        box-shadow 0.15s ease;
        }
        
        .preview-module.drag-over-top {
            border-top: 3px solid #6666FF;
            transition: border-color 0.15s ease;
        }
        
        .preview-module.drag-over-bottom {
            border-bottom: 3px solid #6666FF;
            transition: border-color 0.15s ease;
        }
        
        .preview-module.drop-anim {
            animation: dropBounce 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        @keyframes dropBounce {
            0% {
                transform: scale(1);
            }
            30% {
                transform: scale(1.02);
            }
            60% {
                transform: scale(0.98);
            }
            80% {
                transform: scale(1.01);
            }
            100% {
                transform: scale(1);
            }
        }
        
        .drag-indicator {
            position: absolute;
            top: 4px;
            right: 4px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 4px;
            padding: 4px;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 10;
        }
        
        .preview-module:hover .drag-indicator {
            opacity: 1;
        }
        
        .drag-indicator svg {
            width: 16px;
            height: 16px;
            color: #666;
        }
        
        .preview-module.highlight {
            outline: 3px solid #6666FF !important;
            outline-offset: 4px;
            background: rgba(102, 102, 255, 0.05);
            transition: all 0.3s ease;
        }
        
        .preview-module.editing {
            outline: 3px solid #00C853 !important;
            outline-offset: 4px;
            background: rgba(0, 200, 83, 0.05);
        }
        
        /* 预览区操作按钮 */
        .preview-actions {
            position: absolute;
            top: 4px;
            left: 50%;
            transform: translateX(-50%) translateY(-100%);
            background: rgba(0, 0, 0, 0.75);
            border-radius: 8px;
            padding: 6px 10px;
            display: flex;
            gap: 6px;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 20;
            pointer-events: auto;
        }
        
        .preview-module:hover .preview-actions {
            opacity: 1;
        }
        
        .preview-action-btn {
            background: transparent;
            border: none;
            color: #fff;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            white-space: nowrap;
            transition: background 0.2s;
        }
        
        .preview-action-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .preview-action-btn svg {
            width: 14px;
            height: 14px;
        }
        
        .preview-action-btn.delete:hover {
            background: rgba(255, 68, 68, 0.5);
        }
        
        .user-message {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 24px;
        }
        
        .user-bubble {
            background: #F1EDFF;
            border-radius: 20px;
            padding: 12px 16px;
            max-width: 85%;
            font-size: 17px;
            line-height: 1.5;
            color: #0F131A;
        }
        
        .ai-text {
            font-size: 16px;
            line-height: 1.6;
            color: #1a1a1a;
            margin-bottom: 20px;
        }
        
        .ai-heading-1 {
            font-size: 22px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 12px;
            margin-top: 10px;
        }
        
        .ai-text-body {
            font-size: 16px;
            line-height: 1.6;
            color: #1a1a1a;
            margin-bottom: 24px;
        }
        
        .hotel-name-section {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 10px;
        }
        
        .recommend-reason {
            font-size: 16px;
            line-height: 1.6;
            color: #1a1a1a;
            margin-bottom: 20px;
        }
        
        .recommend-reason strong {
            font-weight: 600;
        }
        
        .hotel-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 12px;
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.03);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .hotel-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        }
        
        .hotel-image {
            width: 80px;
            height: 110px;
            border-radius: 8px;
            overflow: hidden;
            flex-shrink: 0;
            background-color: #f0f0f0;
        }
        
        .hotel-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .hotel-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .hotel-info-top {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 4px;
        }
        
        .hotel-card-name {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
            line-height: 1.4;
        }
        
        .hotel-tag {
            font-size: 11px;
            color: #888;
            background: #F5F5F5;
            border-radius: 4px;
            padding: 2px 6px;
        }
        
        .hotel-rating-row {
            display: flex;
            align-items: center;
            font-size: 13px;
            margin-bottom: 4px;
        }
        
        .rating-blue {
            color: #6666FF;
            font-weight: 500;
            margin-right: 6px;
        }
        
        .rating-rank {
            color: #666;
            font-size: 12px;
        }
        
        .hotel-benefit, .hotel-location {
            font-size: 12px;
            color: #888;
            margin-bottom: 2px;
        }
        
        .hotel-info-bottom {
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 8px;
        }
        
        .hotel-price-area {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        
        .hotel-price {
            display: flex;
            align-items: baseline;
            color: #1a1a1a;
        }
        
        .price-symbol {
            font-size: 12px;
            font-weight: 600;
        }
        
        .price-value {
            font-size: 22px;
            font-weight: 700;
            line-height: 1;
            margin: 0 2px;
        }
        
        .price-suffix {
            font-size: 12px;
            color: #666;
        }
        
        .price-discount {
            font-size: 11px;
            color: #FF4D00;
            margin-top: 2px;
        }
        
        .book-btn {
            background: #EBEBFF;
            color: #6666FF;
            border: none;
            border-radius: 13px;
            padding: 9px 15px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }
        
        /* ================= 机票模块样式（完全按照原始文件） ================= */
        .flight-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 20px 16px;
            margin-bottom: 16px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.03);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .flight-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        }
        
        .flight-route {
            margin-bottom: 16px;
        }
        
        .flight-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #666;
            margin-bottom: 16px;

        .flight-icon {

<body>
    <!-- 左侧编辑器 -->

    <script>
        // 检测是否为内嵌模式
        const urlParams = new URLSearchParams(window.location.search);
        const isEmbeddedMode = urlParams.get('mode') === 'embedded';
        const parentCallback = urlParams.get('callback');
        const storageKey = urlParams.get('storageKey'); // 新增：从 localStorage 读取的 key
        
        // 内嵌模式初始化
        if (isEmbeddedMode) {
            document.body.classList.add('embedded-mode');
            document.getElementById('mainBackBtn').style.display = 'none';
            document.getElementById('embeddedSaveBtn').classList.add('show');
        }
        
        // 加载已有编辑数据
        let initialModules = null;
        let loadedPageName = null;
        
        if (storageKey) {
            console.log('📦 从 localStorage 加载数据，key:', storageKey);
            try {
                const storedData = localStorage.getItem(storageKey);
                if (storedData) {
                    const editData = JSON.parse(storedData);
                    console.log('✅ 成功从 localStorage 解析数据:', editData);
                    
                    if (editData && editData.modules) {
                        initialModules = editData.modules;

        // 添加拖拽事件
        function addDragEvents(element, index) {
            element.addEventListener('dragstart', handleDragStart);
            element.addEventListener('dragover', handleDragOver);
            element.addEventListener('dragleave', handleDragLeave);
            element.addEventListener('drop', handleDrop);
            element.addEventListener('dragend', handleDragEnd);
        }
        
        function handleDragStart(e) {
            draggedIndex = this.dataset.index;
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', draggedIndex);
        }
        
        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            if (this.dataset.index !== draggedIndex) {
                this.classList.add('drag-over');
            }
        }
        
        function handleDragLeave() {
            this.classList.remove('drag-over');
        }
        
        function handleDrop(e) {
            e.preventDefault();
            this.classList.remove('drag-over');
            
            const fromIndex = parseInt(draggedIndex);
            const toIndex = parseInt(this.dataset.index);
            
            if (fromIndex !== toIndex && !isNaN(fromIndex) && !isNaN(toIndex)) {
                // 移动数组元素
                const [movedItem] = appData.modules.splice(fromIndex, 1);
                appData.modules.splice(toIndex, 0, movedItem);
                
                renderEditor();
                renderPreview();
                showToast(`已移动模块到位置 ${toIndex + 1}`);
            }
        }
        
        function handleDragEnd() {
            this.classList.remove('dragging');
            document.querySelectorAll('.module-item').forEach(item => {
                item.classList.remove('drag-over');
            });
            draggedIndex = null;
        }
        
        // 预览区拖拽处理函数
        function handlePreviewDragStart(e) {
            previewDraggedIndex = parseInt(this.dataset.index);
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', previewDraggedIndex);
            
            // 设置拖拽 ghost 图像样式
            if (e.dataTransfer.setDragImage) {
                const dragImage = this.cloneNode(true);
                dragImage.style.position = 'absolute';
                dragImage.style.top = '-9999px';
                dragImage.style.opacity = '0.5';
                dragImage.style.transform = 'scale(1.05)';
                document.body.appendChild(dragImage);
                e.dataTransfer.setDragImage(dragImage, this.offsetWidth / 2, this.offsetHeight / 2);
                setTimeout(() => document.body.removeChild(dragImage), 0);
            }
        }
        
        function handlePreviewDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            
            const currentIndex = parseInt(this.dataset.index);
            if (currentIndex !== previewDraggedIndex) {
                const rect = this.getBoundingClientRect();
                const midpoint = rect.top + rect.height / 2;
                const hoverProgress = e.clientY < midpoint ? 
                    (midpoint - e.clientY) / (midpoint - rect.top) :
                    (e.clientY - midpoint) / (rect.bottom - midpoint);
                
                // 根据鼠标位置动态调整指示线透明度
                const opacity = 0.3 + (hoverProgress * 0.7);
                
                // 判断是拖到上方还是下方
                if (e.clientY < midpoint) {
                    this.classList.remove('drag-over-bottom');
                    this.classList.add('drag-over-top');
                    this.style.borderTopColor = `rgba(102, 102, 255, ${opacity})`;
                } else {
                    this.classList.remove('drag-over-top');
                    this.classList.add('drag-over-bottom');
                    this.style.borderBottomColor = `rgba(102, 102, 255, ${opacity})`;
                }
            }
        }
        
        function handlePreviewDragLeave() {
            this.classList.remove('drag-over-top');
            this.classList.remove('drag-over-bottom');
            this.style.borderTopColor = '';
            this.style.borderBottomColor = '';
        }
        
        function handlePreviewDrop(e) {
            e.preventDefault();
            
            const toIndex = parseInt(this.dataset.index);
            const fromIndex = previewDraggedIndex;
            
            if (fromIndex !== toIndex && !isNaN(fromIndex) && !isNaN(toIndex)) {
                const rect = this.getBoundingClientRect();
                const midpoint = rect.top + rect.height / 2;
                const insertAbove = e.clientY < midpoint;
                
                // 计算实际插入位置
                let actualInsertIndex = toIndex;
                if (!insertAbove && toIndex > fromIndex) {
                    actualInsertIndex = toIndex + 1;
                } else if (insertAbove && toIndex < fromIndex) {
                    actualInsertIndex = toIndex;
                } else if (insertAbove && toIndex > fromIndex) {
                    actualInsertIndex = toIndex;
                } else if (!insertAbove && toIndex < fromIndex) {
                    actualInsertIndex = toIndex + 1;
                }
                
                // 移动数组元素
                const [movedItem] = appData.modules.splice(fromIndex, 1);
                appData.modules.splice(actualInsertIndex, 0, movedItem);
                
                renderEditor();
                renderPreview();
                
                // 添加掉落动画
                setTimeout(() => {
                    const droppedModule = document.querySelectorAll('.preview-module')[actualInsertIndex];
                    if (droppedModule) {
                        droppedModule.classList.add('drop-anim');
                        setTimeout(() => droppedModule.classList.remove('drop-anim'), 400);
                    }
                }, 50);
                
                showToast(`已调整模块顺序`);
            }
            
            this.classList.remove('drag-over-top');
            this.classList.remove('drag-over-bottom');
            this.style.borderTopColor = '';
            this.style.borderBottomColor = '';
        }
        
        function handlePreviewDragEnd() {
            this.classList.remove('dragging');
            document.querySelectorAll('.preview-module').forEach(item => {
                item.classList.remove('drag-over-top');
                item.classList.remove('drag-over-bottom');
                item.style.borderTopColor = '';
                item.style.borderBottomColor = '';
            });
            previewDraggedIndex = null;
        }

        // 点击预览模块，左侧定位并高亮
        function handlePreviewClick(e) {
            // 如果点击的是操作按钮，不触发
            if (e.target.closest('.preview-actions') || e.target.closest('.drag-indicator')) {
                return;
            }
            
            const index = parseInt(this.dataset.index);
            
            // 移除所有高亮
            document.querySelectorAll('.preview-module').forEach(m => m.classList.remove('highlight'));
            document.querySelectorAll('.module-item').forEach(m => m.classList.remove('highlight'));
            
            // 高亮当前模块
            this.classList.add('highlight');
            
            // 左侧编辑器滚动到对应模块
            const editorModule = document.querySelectorAll('.module-item')[index];
            if (editorModule) {
                editorModule.scrollIntoView({ behavior: 'smooth', block: 'center' });
                editorModule.classList.add('highlight');
                
                // 2 秒后移除高亮
                setTimeout(() => {
                    editorModule.classList.remove('highlight');
                }, 2000);
            }
        }
        
        // 双击预览模块，快捷编辑
        function handlePreviewDblClick(e) {
            // 如果点击的是操作按钮，不触发
            if (e.target.closest('.preview-actions') || e.target.closest('.drag-indicator')) {
                return;
            }
            
            const index = parseInt(this.dataset.index);
            const module = appData.modules[index];
            
            // 找到第一个可编辑的文本字段
            const firstTextField = Object.keys(module.data).find(key => 
                typeof module.data[key] === 'string' && key !== 'imageUrl'
            );
            
            if (firstTextField) {
                // 左侧编辑器滚动到对应模块
                const editorModule = document.querySelectorAll('.module-item')[index];
                if (editorModule) {
                    editorModule.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    
                    // 聚焦到第一个输入框
                    setTimeout(() => {
                        const input = editorModule.querySelector('.field-input');
                        if (input) {
                            input.focus();
                            input.select();
                            editorModule.classList.add('editing');
                            
                            // 移除编辑状态
                            input.addEventListener('blur', () => {
                                setTimeout(() => {
                                    editorModule.classList.remove('editing');
                                }, 300);
                            }, { once: true });
                        }
                    }, 300);
                }
            }
        }

        // 下载页面
        function downloadPage() {
            // 生成纯预览的 HTML 内容
            const htmlContent = generateStandaloneHTML();
            
            // 创建 Blob 并下载
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `飞猪千问-demo-${Date.now()}.html`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showToast('页面已下载，可在浏览器中打开');
        }
        
        // 保存到父页面（内嵌模式）
        function saveToParent() {
            if (!isEmbeddedMode || !parentCallback) {
                showToast('非内嵌模式，无法保存');
                return;
            }
            
            // 显示保存对话框
            openSaveDialog();

        // 打开保存对话框
        function openSaveDialog() {
            const overlay = document.getElementById('saveDialogOverlay');
            const nameInput = document.getElementById('savePageName');
            
            // 重置为默认值
            document.getElementById('savePageWidth').value = '375';
            document.getElementById('savePageHeight').value = '812';
            nameInput.value = '';
            
            overlay.classList.add('active');
            setTimeout(() => nameInput.focus(), 100);
        }
        
        // 关闭保存对话框
        function closeSaveDialog() {
            const overlay = document.getElementById('saveDialogOverlay');
            overlay.classList.remove('active');
        }
        
        // 确认保存
        function confirmSaveToParent() {
            const pageName = document.getElementById('savePageName').value.trim();
            const width = parseInt(document.getElementById('savePageWidth').value) || 375;
            const height = parseInt(document.getElementById('savePageHeight').value) || 812;
            
            if (!pageName) {
                showToast('请输入页面名称');
                return;
            }
            
            // 生成预览 HTML
            const previewHtml = generateStandaloneHTML();
            
            // 计算总高度
            const chatContent = document.getElementById('chatContent');
            const inputBarContainer = document.querySelector('.input-bar-container');
            let totalHeight = height;
            
            if (chatContent) {
                const contentHeight = chatContent.scrollHeight;
                const inputHeight = inputBarContainer ? inputBarContainer.offsetHeight : 80;
                const headerHeight = 140;
                totalHeight = Math.max(height, headerHeight + contentHeight + inputHeight + 40);
            }
            
            // 准备数据
            const pageData = {
                pageName: pageName,
                modules: JSON.parse(JSON.stringify(appData.modules)),
                previewHtml: previewHtml,
                totalHeight: totalHeight,
                displayWidth: width,  // 保存显示宽度
                displayHeight: height, // 保存显示高度
                timestamp: Date.now()
            };
            
            // 检查是否是编辑现有页面（通过 storageKey 判断）
            const isEdit = storageKey !== null;
            
            console.log('保存模式:', isEdit ? '编辑模式' : '新增模式', 'storageKey:', storageKey);
            
            // 关闭对话框
            closeSaveDialog();
            
            // 添加到动画类
            document.body.classList.add('saving');
            
            console.log('发送消息到父页面:', {
                type: isEdit ? 'pageUpdated' : 'pageSaved',
                data: pageData
            });
            
            // 发送到父页面
            window.parent.postMessage({
                type: isEdit ? 'pageUpdated' : 'pageSaved',
                data: pageData
            }, parentCallback);
            
            showToast(isEdit ? '页面已更新' : '页面已保存到画板');
            
            // 延迟关闭编辑器（让父页面有时间接收消息）
            setTimeout(() => {
                document.body.classList.remove('saving');
            }, 300);
        }
